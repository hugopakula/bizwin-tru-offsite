<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Classi logo — for light backgrounds</title>
  <desc>Classi wordmark with a gold and bronze wing-shaped mark, charcoal text, tagline "For winners everywhere" beneath. Use on white or off-white backgrounds.</desc>
  <g transform="translate(70,40)">
    <polygon points="90,205 15,20 90,90" fill="#C7A662"/>
    <polygon points="90,205 165,20 90,90" fill="#8B6A3D"/>
    <polygon points="90,205 86,150 90,90 94,150" fill="#FBF5E8"/>
  </g>
  <text x="270" y="195" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="100" letter-spacing="-2" fill="#17140F">Classi</text>
  <text x="272" y="233" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="18" letter-spacing="5" fill="#17140F" opacity="0.65">FOR WINNERS EVERYWHERE</text>
</svg>
