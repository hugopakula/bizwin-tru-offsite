<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Classi logo — for dark backgrounds</title>
  <desc>Classi wordmark and wing-shaped mark in a single off-white color, tagline "For winners everywhere" beneath. Use on charcoal, navy, or photographic backgrounds.</desc>
  <g transform="translate(70,40)">
    <polygon points="90,205 15,20 90,90 165,20" fill="#F6F1E6"/>
    <polygon points="90,205 86,150 90,90 94,150" fill="#000000" opacity="0.18"/>
  </g>
  <text x="270" y="195" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="100" letter-spacing="-2" fill="#F6F1E6">Classi</text>
  <text x="272" y="233" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="18" letter-spacing="5" fill="#F6F1E6" opacity="0.85">FOR WINNERS EVERYWHERE</text>
</svg>
