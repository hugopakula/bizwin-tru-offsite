<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BizWin logo — color variants</title>
  <desc>Three color variants of the BizWin logo lockup: gold background with off-white mark, off-white background with full-color mark, and charcoal background with off-white mark. Tagline "For winners everywhere" appears beneath the wordmark in each.</desc>

  <rect x="0" y="0" width="900" height="300" fill="#C7A662"/>
  <rect x="0" y="300" width="900" height="300" fill="#F6F1E6"/>
  <rect x="0" y="600" width="900" height="300" fill="#17140F"/>

  <!-- Row 1: off-white mark + wordmark on gold -->
  <g transform="translate(70,35)">
    <polygon points="90,205 15,20 90,90 165,20" fill="#F6F1E6"/>
    <polygon points="90,205 86,150 90,90 94,150" fill="#C7A662"/>
  </g>
  <text x="270" y="190" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="100" letter-spacing="-2" fill="#F6F1E6">BizWin</text>
  <text x="272" y="228" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="18" letter-spacing="5" fill="#F6F1E6" opacity="0.85">FOR WINNERS EVERYWHERE</text>

  <!-- Row 2: full-color mark + charcoal wordmark on off-white -->
  <g transform="translate(70,335)">
    <polygon points="90,205 15,20 90,90" fill="#C7A662"/>
    <polygon points="90,205 165,20 90,90" fill="#8B6A3D"/>
    <polygon points="90,205 86,150 90,90 94,150" fill="#FBF5E8"/>
  </g>
  <text x="270" y="490" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="100" letter-spacing="-2" fill="#17140F">BizWin</text>
  <text x="272" y="528" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="18" letter-spacing="5" fill="#17140F" opacity="0.65">FOR WINNERS EVERYWHERE</text>

  <!-- Row 3: off-white mark + wordmark on charcoal -->
  <g transform="translate(70,635)">
    <polygon points="90,205 15,20 90,90 165,20" fill="#F6F1E6"/>
    <polygon points="90,205 86,150 90,90 94,150" fill="#17140F"/>
  </g>
  <text x="270" y="790" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="100" letter-spacing="-2" fill="#F6F1E6">BizWin</text>
  <text x="272" y="828" font-family="'Poppins','Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="18" letter-spacing="5" fill="#F6F1E6" opacity="0.85">FOR WINNERS EVERYWHERE</text>
</svg>
